<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clutchify v2 - Clean SPA</title>
    <link rel="shortcut icon" href="./public/img/clutchify-w-o-text.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script>
        const path = window.location.pathname;
        if (path.includes('login') || path.includes('register')) {
            document.documentElement.classList.add('auth-mode');
        }
    </script>
</head>
<body>

    <div class="app-layout">
        
        <aside class="sidebar">
            <div class="logo"><img src="./public/img/clutchify-w-text.png" alt="Logo"></div>
            <nav>
                <button class="nav-btn active" onclick="router.navigate('dashboard')">Panel Główny</button>
                <button class="nav-btn" onclick="router.navigate('teams')">Drużyny</button>
            </nav>

            <div class="profile">
                <button id="nav-profile" class="nav-btn" onclick="authController.handleLogout()">Profil</button>
            </div>
        </aside>
        <main id="app"></main>

    </div>
    <div id="toast-container"></div>
    <script type="module" src="app.js"></script>
</body>
</html>
