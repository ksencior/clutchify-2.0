<!DOCTYPE html>
<html lang="pl">
<head>
    <base href="/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clutchify v2 - Clean SPA</title>
    <link rel="shortcut icon" href="./public/img/clutchify-w-o-text.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css?v=123">
    <script>
        const path = window.location.pathname;
        if (path.includes('login') || path.includes('register')) {
            document.documentElement.classList.add('auth-mode');
        }
    </script>
</head>
<body>

    <div class="app-layout">
        
        <aside class="sidebar">
            <div class="logo"><img src="./public/img/clutchify-w-text.png" alt="Logo"></div>
            <nav>
                <button class="nav-btn active" onclick="router.navigate('dashboard')">Panel Główny</button>
                <button class="nav-btn" onclick="router.navigate('teams')">Drużyny</button>
                <button class="nav-btn" onclick="router.navigate('tournaments')">Turnieje</button>
                <button class="nav-btn" onclick="router.navigate('players')">Gracze</button>
                <button class="nav-btn" onclick="router.navigate('friends')">Znajomi i czat</button>

                <button class="nav-btn admin-only" onclick="router.navigate('admin')" style="display: none;">
                    Centrum admina
                </button>
            </nav>

            <div class="profile">
                <button id="nav-notifications" class="notification-sidebar-card" type="button">
                    <span class="notification-icon">🔔</span>

                    <span class="notification-text">
                        <strong>Powiadomienia</strong>
                        <small>Kliknij, aby otworzyć</small>
                    </span>

                    <span id="notif-badge" class="notification-badge" style="display: none;">0</span>
                </button>
                <button id="nav-profile" class="nav-btn">Profil</button>
            </div>
        </aside>
        <main id="app"></main>

    </div>
    <div id="drawer-overlay" class="drawer-overlay"></div>
    <div id="notification-drawer" class="drawer">
        <div class="drawer-header">
            <h3 style="margin: 0; display: flex; align-items: center; gap: 10px;">
                Powiadomienia
                <span
                    id="drawer-count"
                    style="display: none; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 10px; font-size: 12px;"
                >0</span>
            </h3>
            <button id="btn-close-drawer" class="btn-cancel" style="padding: 5px 12px; margin: 0;">&times;</button>
        </div>
        <div class="activity-tabs">
            <button
                id="activity-tab-notifications"
                class="activity-tab active"
                onclick="notificationController.switchTab('notifications')"
                type="button"
            >
                Powiadomienia
                <span id="activity-notifications-count" style="display: none;">0</span>
            </button>

            <button
                id="activity-tab-messages"
                class="activity-tab"
                onclick="notificationController.switchTab('messages')"
                type="button"
            >
                Wiadomości
                <span id="activity-messages-count" style="display: none;">0</span>
            </button>
        </div>
        <div id="drawer-content" class="drawer-content">
            <div style="text-align: center; color: var(--text-gray); margin-top: 40px; font-size: 14px;">
                Brak nowych powiadomień.
            </div>
        </div>
    </div>
    <div id="pop-menu" class="is-closed" aria-hidden="true">
        <div class="content">
            <button class="nav-btn" onclick="router.navigate('profile')">Twój profil</button>
            <button class="nav-btn" onclick="router.navigate('settings')">Ustawienia konta</button>
            <button class="nav-btn" onclick="authController.handleLogout()" style="margin-top: auto;">Wyloguj się</button>
        </div>
    </div>
    <div id="popout-overlay">
        <div id="popout-container"></div>
    </div>
    <div id="toast-container"></div>
    <script type="module" src="app.js"></script>
</body>
</html>
