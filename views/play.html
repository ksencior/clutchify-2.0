<div class="play-page">
    <section class="play-hero">
        <div>
            <span class="eyebrow">Clutchify game center</span>
            <h1>Graj</h1>
            <p id="play-team-hint">Tu zobaczysz aktywne mecze swojej drużyny.</p>
        </div>

        <div class="play-hero-stat">
            <strong id="play-active-count">0</strong>
            <span>aktywne mecze</span>
        </div>
    </section>

    <section class="practice-card">
        <div class="practice-head">
            <div>
                <span class="eyebrow">Practice</span>
                <h2>Solo</h2>
                <p id="practice-status-text">Ładowanie statusu serwerów...</p>
            </div>

            <span id="practice-status-pill" class="practice-pill">Status</span>
        </div>

        <div class="practice-grid">
            <label>
                Serwer
                <select id="practice-server"></select>
            </label>

            <label>
                Mapa
                <select id="practice-map"></select>
            </label>

            <button id="btn-practice-start" class="btn-confirm" onclick="playController.startPractice()">
                Start
            </button>

            <button id="btn-practice-change-map" class="btn-confirm" onclick="playController.practiceAction('change_map')" style="display: none;">
                Zmień mapę
            </button>
        </div>

        <div id="practice-active-panel" class="practice-active-panel" style="display:none;">
            <div>
                <strong>Connect</strong>
                <code id="practice-connect-string">connect ...</code>
            </div>

            <button class="btn-ok compact" onclick="playController.copyPracticeConnect()">
                Kopiuj connect
            </button>
        </div>

        <div id="practice-controls" class="practice-controls" style="display:none;">
            <button class="btn-ok compact" onclick="playController.practiceAction('practice_cfg')">Reload CFG</button>
            <button class="btn-ok compact" onclick="playController.practiceAction('restart')">Restart rundy</button>
            <button class="btn-ok compact" onclick="playController.practiceAction('kick_bots')">Kick boty</button>
            <button class="btn-ok compact" onclick="playController.practiceAction('add_bot_ct')">Bot CT</button>
            <button class="btn-ok compact" onclick="playController.practiceAction('add_bot_t')">Bot T</button>
            <button class="btn-ok compact" onclick="playController.practiceAction('pause')">Pause</button>
            <button class="btn-ok compact" onclick="playController.practiceAction('unpause')">Unpause</button>
            <button class="btn-cancel compact" onclick="playController.endPractice()">Koniec practice</button>
        </div>
    </section>

    <section class="play-section">
        <div class="tournament-section-heading" style="display: flex; align-items: center;">
            <div>
                <h2>Twoje mecze</h2>
                <p>Lobby, ready check i szybki powrót do aktywnych spotkań.</p>
            </div>

            <button class="btn-ok" onclick="playController.load()" style="margin: 0; margin-left: auto;">Odśwież</button>
        </div>

        <div id="play-matches-list" class="play-matches-list" style="margin-top: 20px;">
            <div class="empty-state">Ładowanie meczów...</div>
        </div>
    </section>
</div>
